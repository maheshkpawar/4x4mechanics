<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – 4x4 Mechanics Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter",sans-serif;background:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#1A1A1A;border:1px solid #C9A84C;border-radius:16px;padding:48px 40px;width:90%;max-width:400px;text-align:center;}
.box h1{font-family:"Bebas Neue";font-size:2rem;color:#C9A84C;margin-bottom:4px;}
.box p{color:#888;font-size:.85rem;margin-bottom:28px;}
.error{background:rgba(192,57,43,.15);border:1px solid #c0392b;color:#e74c3c;padding:10px;border-radius:6px;font-size:.82rem;margin-bottom:16px;}
input{width:100%;padding:13px 15px;margin-bottom:14px;background:#222;border:1px solid #333;border-radius:8px;color:#F5F0E8;font-size:.95rem;outline:none;transition:border-color .3s;}
input:focus{border-color:#C9A84C;}
button{width:100%;padding:14px;background:#C9A84C;color:#0A0A0A;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:"Bebas Neue";letter-spacing:1px;font-size:1.05rem;transition:background .3s;}
button:hover{background:#E8C96A;}
.back{display:block;margin-top:16px;color:#888;text-decoration:none;font-size:.8rem;}
.back:hover{color:#C9A84C;}
.hint{color:#333;font-size:.74rem;margin-top:12px;}
</style>
</head>
<body>
<div class="box">
  <h1>Admin Login</h1>
  <p>4x4 Mechanics Garage — Admin Panel</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="text" name="username" placeholder="Username" autocomplete="off" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">LOGIN →</button>
  </form>
  <a href="/" class="back">← Back to website</a>
  <div class="hint">Default: admin / 4x4admin@2026</div>
</div>
</body>
</html>
